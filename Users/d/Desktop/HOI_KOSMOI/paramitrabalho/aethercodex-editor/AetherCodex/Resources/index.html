<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Pythia AI</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'SF Pro Text', sans-serif;
            background: #1e1e1e;
            color: #d4d4d4;
            height: 100vh;
            display: flex;
            flex-direction: column;
        }
        
        #chat-container {
            flex: 1;
            overflow-y: auto;
            padding: 16px;
        }
        
        .message {
            margin-bottom: 16px;
            padding: 12px 16px;
            border-radius: 8px;
            max-width: 90%;
        }
        
        .message.user {
            background: #0e639c;
            margin-left: auto;
        }
        
        .message.assistant {
            background: #2d2d30;
        }
        
        .message .role {
            font-size: 11px;
            color: #858585;
            margin-bottom: 4px;
            text-transform: uppercase;
        }
        
        .message .content {
            font-size: 13px;
            line-height: 1.5;
        }
        
        #input-container {
            padding: 16px;
            border-top: 1px solid #3c3c3c;
            display: flex;
            gap: 8px;
        }
        
        #message-input {
            flex: 1;
            background: #3c3c3c;
            border: 1px solid #5a5a5a;
            border-radius: 6px;
            padding: 10px 12px;
            color: #d4d4d4;
            font-size: 13px;
            resize: none;
            min-height: 40px;
            max-height: 120px;
        }
        
        #send-button {
            background: #0e639c;
            border: none;
            border-radius: 6px;
            padding: 0 16px;
            color: white;
            font-size: 13px;
            cursor: pointer;
        }
        
        #send-button:hover {
            background: #1177bb;
        }
        
        #send-button:disabled {
            background: #5a5a5a;
            cursor: not-allowed;
        }
        
        .thinking {
            opacity: 0.7;
            font-style: italic;
        }
        
        pre {
            background: #1e1e1e;
            padding: 12px;
            border-radius: 4px;
            overflow-x: auto;
            margin: 8px 0;
        }
        
        code {
            font-family: 'SF Mono', Monaco, monospace;
            font-size: 12px;
        }
    </style>
</head>
<body>
    <div id="chat-container"></div>
    <div id="input-container">
        <textarea id="message-input" placeholder="Ask Pythia..."></textarea>
        <button id="send-button">Send</button>
    </div>
    
    <script>
        const chatContainer = document.getElementById('chat-container');
        const messageInput = document.getElementById('message-input');
        const sendButton = document.getElementById('send-button');
        
        let pythiaContext = {};
        
        // Called from Swift
        window.receiveMessage = function(text) {
            addMessage('assistant', text);
        };
        
        // Called from Swift with context
        window.setContext = function(context) {
            pythiaContext = context;
        };
        
        function addMessage(role, content) {
            const messageDiv = document.createElement('div');
            messageDiv.className = `message ${role}`;
            messageDiv.innerHTML = `
                <div class="role">${role}</div>
                <div class="content">${formatContent(content)}</div>
            `;
            chatContainer.appendChild(messageDiv);
            chatContainer.scrollTop = chatContainer.scrollHeight;
        }
        
        function formatContent(text) {
            // Simple markdown formatting
            return text
                .replace(/&/g, '&amp;')
                .replace(/</g, '&lt;')
                .replace(/>/g, '&gt;')
                .replace(/```(\w+)?\n([\s\S]*?)```/g, '<pre><code>$2</code></pre>')
                .replace(/`([^`]+)`/g, '<code>$1</code>')
                .replace(/\n/g, '<br>');
        }
        
        function sendMessage() {
            const text = messageInput.value.trim();
            if (!text) return;
            
            addMessage('user', text);
            messageInput.value = '';
            sendButton.disabled = true;
            
            // Send to Swift via message handler
            if (window.webkit && window.webkit.messageHandlers && window.webkit.messageHandlers.pythia) {
                window.webkit.messageHandlers.pythia.postMessage({
                    action: 'ask',
                    question: text,
                    context: pythiaContext
                });
            }
        }
        
        sendButton.addEventListener('click', sendMessage);
        messageInput.addEventListener('keydown', (e) => {
            if (e.key === 'Enter' && !e.shiftKey) {
                e.preventDefault();
                sendMessage();
            }
        });
    </script>
</body>
</html>
