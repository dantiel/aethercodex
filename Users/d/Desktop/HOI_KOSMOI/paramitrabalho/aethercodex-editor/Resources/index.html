<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Pythia</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
            background: #1e1e1e;
            color: #d4d4d4;
            height: 100vh;
            display: flex;
            flex-direction: column;
            overflow: hidden;
        }
        
        #chat-container {
            flex: 1;
            overflow-y: auto;
            padding: 16px;
        }
        
        .message {
            margin-bottom: 12px;
            padding: 12px 16px;
            border-radius: 12px;
            max-width: 90%;
            animation: fadeIn 0.2s ease-out;
        }
        
        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(8px); }
            to { opacity: 1; transform: translateY(0); }
        }
        
        .message.user {
            background: #0e639c;
            margin-left: auto;
            color: white;
        }
        
        .message.assistant {
            background: #252526;
            border: 1px solid #3c3c3c;
        }
        
        .message.thinking {
            background: #3c3c3c;
            font-style: italic;
            color: #808080;
        }
        
        .message.error {
            background: #5a1d1d;
            border-color: #8b3a3a;
        }
        
        .message pre {
            background: #1a1a1a;
            padding: 12px;
            border-radius: 6px;
            overflow-x: auto;
            margin: 8px 0;
        }
        
        .message code {
            font-family: 'SF Mono', Monaco, 'Cascadia Code', monospace;
            font-size: 13px;
        }
        
        .message .inline-code {
            background: #3c3c3c;
            padding: 2px 6px;
            border-radius: 3px;
            font-size: 0.9em;
        }
        
        .timestamp {
            font-size: 11px;
            color: #6e6e6e;
            margin-top: 4px;
        }
        
        .tool-call {
            background: #2d2d2d;
            border-left: 3px solid #0e639c;
            padding: 8px 12px;
            margin: 8px 0;
            border-radius: 0 6px 6px 0;
        }
        
        .tool-name {
            font-weight: 600;
            color: #4fc1ff;
            font-size: 12px;
        }
        
        .tool-args {
            font-family: monospace;
            font-size: 11px;
            color: #9cdcfe;
            margin-top: 4px;
            white-space: pre-wrap;
            word-break: break-all;
        }
        
        .loading {
            display: flex;
            align-items: center;
            gap: 8px;
            color: #808080;
        }
        
        .loading::after {
            content: '';
            width: 16px;
            height: 16px;
            border: 2px solid #3c3c3c;
            border-top-color: #0e639c;
            border-radius: 50%;
            animation: spin 0.8s linear infinite;
        }
        
        @keyframes spin {
            to { transform: rotate(360deg); }
        }
    </style>
</head>
<body>
    <div id="chat-container"></div>
    
    <script>
        const chatContainer = document.getElementById('chat-container');
        
        function addMessage(role, content, isThinking = false) {
            const div = document.createElement('div');
            div.className = `message ${role}${isThinking ? ' thinking' : ''}`;
            div.innerHTML = formatContent(content);
            
            const timestamp = document.createElement('div');
            timestamp.className = 'timestamp';
            timestamp.textContent = new Date().toLocaleTimeString();
            div.appendChild(timestamp);
            
            chatContainer.appendChild(div);
            scrollToBottom();
            
            return div;
        }
        
        function formatContent(content) {
            // Escape HTML
            let html = content
                .replace(/&/g, '&amp;')
                .replace(/</g, '&lt;')
                .replace(/>/g, '&gt;');
            
            // Code blocks
            html = html.replace(/```(\w+)?\n([\s\S]*?)```/g, (match, lang, code) => {
                return `<pre><code class="language-${lang || 'text'}">${code}</code></pre>`;
            });
            
            // Inline code
            html = html.replace(/`([^`]+)`/g, '<code class="inline-code">$1</code>');
            
            // Line breaks
            html = html.replace(/\n/g, '<br>');
            
            return html;
        }
        
        function addToolCall(name, args) {
            const div = document.createElement('div');
            div.className = 'tool-call';
            div.innerHTML = `
                <div class="tool-name">🔧 ${name}</div>
                <div class="tool-args">${JSON.stringify(args, null, 2)}</div>
            `;
            chatContainer.appendChild(div);
            scrollToBottom();
        }
        
        function showLoading() {
            const div = document.createElement('div');
            div.className = 'message assistant loading';
            div.id = 'loading-indicator';
            div.textContent = 'Thinking...';
            chatContainer.appendChild(div);
            scrollToBottom();
            return div;
        }
        
        function hideLoading() {
            const loading = document.getElementById('loading-indicator');
            if (loading) loading.remove();
        }
        
        function clearChat() {
            chatContainer.innerHTML = '';
        }
        
        function scrollToBottom() {
            chatContainer.scrollTop = chatContainer.scrollHeight;
        }
        
        // Bridge to native
        window.sendToNative = function(message) {
            if (window.webkit && window.webkit.messageHandlers.aetherCodex) {
                window.webkit.messageHandlers.aetherCodex.postMessage(message);
            }
        };
        
        // Welcome message
        addMessage('assistant', 'Welcome to AetherCodex. The Oracle awaits your questions.');
    </script>
</body>
</html>
