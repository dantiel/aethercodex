<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>AetherCodex Chamber</title>
  <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;700&display=swap">
  <link rel="stylesheet" href="$UIDIR/glyphs.css?random=$RANDOM" id="glyphs-stylesheet">
  <link rel="stylesheet" href="$UIDIR/tool-styles.css?random=$RANDOM">
  <link rel="stylesheet" href="$UIDIR/status-styles.css?random=$RANDOM">
  <link rel="stylesheet" href="$UIDIR/syntax-styles.css?random=$RANDOM">
  <link rel="stylesheet" href="$UIDIR/task-log-styles.css?random=$RANDOM">
  <link rel="stylesheet" href="$UIDIR/horologium.css?random=$RANDOM">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
</head>
<body>
  <div id="messages" class="cosmic-chamber"></div>
  <div id="file-overview-container" class="file-overview-panel" style="display: none;"></div>
  <div id="input-bar" class="rounded-box">
    <div class="input-container">
      <textarea id="chat-input" placeholder="🌟 Commune with the AetherCodex..." autocomplete="off" spellcheck="false" aria-label="Chat input" rows="1" style="resize: none; overflow-y: hidden;"></textarea>
      <div class="input-accent"></div>
    </div>
    <div class="input-controls">
      <label class="pair-toggle" title="Toggle pair programming mode">
        <input type="checkbox" id="pair-toggle-checkbox">
        <span class="pair-toggle-slider"></span>
        <span class="pair-toggle-label">👥 Pair</span>
      </label>
      <button id="send-btn">
        <span class="send-glyph">⚡️</span>
      </button>
    </div>
  </div>
  <script>window.AETHER_PORT=$AETHER_PORT;window.AETHER_PROJECT_ROOT="$AETHER_PROJECT_ROOT";</script>
  <script src="https://cdn.jsdelivr.net/npm/mermaid@10.6.1/dist/mermaid.min.js"></script>
  <script src="$UIDIR/magnum_opus.js?random=$RANDOM"></script>
  <script src="$UIDIR/pythia.js?random=$RANDOM"></script>
  <script src="$UIDIR/horologium.js?random=$RANDOM"></script>
</body>
</html>
